name: 📊 Update All Data

# ──────────────────────────────────────────────────────────────────────────────
# ETF 溢价 + 宏观指标 → public/*.json → commit → GitHub Pages 自动刷新
#
# 调度说明（GitHub cron 为 UTC，可能有 5–15 分钟延迟）：
#   工作日：仅 A 股交易时段触发，首个盘中更新点固定为 BJT 09:30
#           09:30 / 10:00 / 10:30 / 11:00 / 11:30 / 13:00 / 13:30 / 14:00 / 14:30 / 15:00
#   周末：每 2 小时
#   兜底：每天 UTC 08:20 ≈ BJT 16:20 强制快照（收盘后）
#
# 历史问题备忘：
#   - [skip ci] 会阻止 Pages 部署 → 已移除
#   - 盘中首个更新点改到 BJT 09:30，避免开盘后仍停留在盘前数据
#   - ETF 多段复杂 cron 几乎不触发 → 保持显式半小时时点，避免 */15 模式不稳定
#   - ETF 失败会阻断 macro → update.sh 允许部分成功
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 工作日 09:30（UTC 01:30）
    - cron: '30 1 * * 1-5'
    # 工作日上午盘 10:00–11:30（UTC 02:00–03:30）
    - cron: '0,30 2-3 * * 1-5'
    # 工作日下午盘 13:00–14:30（UTC 05:00–06:30）
    - cron: '0,30 5-6 * * 1-5'
    # 工作日收盘点 15:00（UTC 07:00）
    - cron: '0 7 * * 1-5'
    # 周末每 2 小时
    - cron: '5 */2 * * 0,6'
    # 每日兜底：UTC 08:20 ≈ BJT 16:20（A 股收盘后）
    - cron: '20 8 * * *'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-updates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-all:
    name: Fetch & Commit All Data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch, commit & push
        env:
          PYTHON: python
          SKIP_GIT_PULL: '1'
        run: |
          git pull --rebase origin main
          bash scripts/update.sh
