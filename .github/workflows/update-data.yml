name: 📊 Update All Data

# ──────────────────────────────────────────────────────────────────────────────
# ETF 溢价 + 宏观指标 → public/*.json → commit → GitHub Pages 自动刷新
#
# 调度说明（GitHub cron 为 UTC，可能有 5–15 分钟延迟）：
#   工作日：每 30 分钟（5,35 * * * 1-5）— 与旧 macro workflow 相同，已验证可靠
#   周末：每 2 小时
#   兜底：每天 UTC 08:20 ≈ BJT 16:20 强制快照（收盘后）
#
# 历史问题备忘：
#   - [skip ci] 会阻止 Pages 部署 → 已移除
#   - ETF 多段复杂 cron 几乎不触发 → 已改为简单 30 分钟模式
#   - ETF 失败会阻断 macro → update.sh 允许部分成功
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 工作日每 30 分钟（macro 旧 workflow 验证过此模式）
    - cron: '5,35 * * * 1-5'
    # 周末每 2 小时
    - cron: '5 */2 * * 0,6'
    # 每日兜底：UTC 08:20 ≈ BJT 16:20（A 股收盘后）
    - cron: '20 8 * * *'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-updates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-all:
    name: Fetch & Commit All Data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch, commit & push
        env:
          PYTHON: python
          SKIP_GIT_PULL: '1'
        run: |
          git pull --rebase origin main
          bash scripts/update.sh
